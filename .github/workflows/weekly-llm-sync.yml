name: Weekly llm.txt Sync

on:
  schedule:
    - cron: '0 21 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-llmtxt:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run llm.txt sync
        run: |
          python3 scripts/sync_llmtxt_to_github.py

      - name: Show diff
        run: |
          git --no-pager diff -- knowledge/pricing.md knowledge/coupons.md || true

      - name: Commit changes if needed
        run: |
          if ! git diff --quiet -- knowledge/pricing.md knowledge/coupons.md; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add knowledge/pricing.md knowledge/coupons.md
            git commit -m "Weekly sync pricing and coupon blocks from llm.txt"
            git push
          else
            echo "No pricing/coupon changes detected."
          fi
